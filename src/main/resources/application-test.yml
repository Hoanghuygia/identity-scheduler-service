spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  mail:
    host: localhost
    port: 1025
    username: test@example.com
    password: 
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
            required: false

app:
  jwt:
    issuer: test-auth-service
    access-token-expiry-seconds: 900
    refresh-token-expiry-seconds: 1209600
    public-key: test-public-key
    private-key: test-private-key
  frontend:
    base-url: http://localhost:3000
  backend:
    base-url: http://localhost:8080

