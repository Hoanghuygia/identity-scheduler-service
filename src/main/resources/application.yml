spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_service}
    username: ${DB_USERNAME:auth_user}
    password: ${DB_PASSWORD:auth_password}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    issuer: ${JWT_ISSUER:auth-service}
    access-token-expiry-seconds: ${JWT_ACCESS_TOKEN_EXPIRY:900}
    refresh-token-expiry-seconds: ${JWT_REFRESH_TOKEN_EXPIRY:1209600}
    public-key: ${JWT_PUBLIC_KEY:replace_me}
    private-key: ${JWT_PRIVATE_KEY:replace_me}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: Lightweight auth service starter template
    version: @project.version@

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.example.authservice: INFO

